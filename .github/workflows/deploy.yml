name: deploy

# Keyless deploy: GitHub Actions assumes an AWS IAM role via OIDC.
# No long-lived access keys are stored in the repo — only the role ARN, which is
# useless without the trust policy scoped to this repo. See README "CI/CD".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # required to request the OIDC token
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure AWS credentials (OIDC, short-lived)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Build
        run: sam build

      - name: Deploy
        run: sam deploy --no-confirm-changeset --no-fail-on-empty-changeset

      # Optional: sync the static SPA + invalidate CloudFront once those
      # resources exist (left as a follow-up; see README phase 3).
