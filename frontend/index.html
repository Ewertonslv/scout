<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>scout — multi-agent research</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root { --bg:#0b0f17; --panel:#141a26; --accent:#5b8cff; --muted:#8a93a6; --ok:#3ad29f; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
           background: var(--bg); color:#e6e9ef; }
    .wrap { max-width: 820px; margin: 0 auto; padding: 48px 20px; }
    h1 { font-size: 2rem; margin: 0 0 6px; }
    .tagline { color: var(--muted); margin: 0 0 28px; }
    form { display:flex; gap:10px; }
    input[type=text] { flex:1; padding:14px 16px; border-radius:10px; border:1px solid #263042;
                       background: var(--panel); color:#fff; font-size:1rem; }
    button { padding:14px 22px; border:0; border-radius:10px; background: var(--accent); color:#fff;
             font-weight:600; font-size:1rem; cursor:pointer; }
    button:disabled { opacity:.5; cursor:not-allowed; }
    .stages { display:flex; gap:8px; margin:24px 0; flex-wrap:wrap; }
    .stage { flex:1; min-width:120px; padding:12px; border-radius:10px; background: var(--panel);
             border:1px solid #263042; text-align:center; font-size:.85rem; color:var(--muted);
             transition: all .25s; }
    .stage.active { border-color: var(--accent); color:#fff; box-shadow:0 0 0 1px var(--accent); }
    .stage.done { border-color: var(--ok); color: var(--ok); }
    .brief { margin-top:28px; padding:24px; background: var(--panel); border-radius:14px;
             border:1px solid #263042; line-height:1.6; }
    .brief h1,.brief h2 { border-bottom:1px solid #263042; padding-bottom:6px; }
    .brief a { color: var(--accent); }
    .err { color:#ff7a7a; margin-top:20px; }
    .opt { color:var(--muted); font-size:.85rem; margin-top:10px; display:flex; gap:6px; align-items:center; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>scout</h1>
    <p class="tagline">Ask a question. Five AI agents research it in parallel on AWS and hand you back a cited brief.</p>

    <form id="form">
      <input id="topic" type="text" placeholder="e.g. trade-offs of serverless vs containers" required minlength="3" />
      <button id="go" type="submit">Research</button>
    </form>
    <label class="opt"><input type="checkbox" id="quality" /> quality mode (Claude Haiku 4.5 — slightly higher cost)</label>

    <div class="stages" id="stages" hidden>
      <div class="stage" data-s="PLANNING">Planning</div>
      <div class="stage" data-s="RESEARCHING">Researching</div>
      <div class="stage" data-s="VERIFYING">Verifying</div>
      <div class="stage" data-s="SYNTHESIZING">Synthesizing</div>
    </div>

    <div id="error" class="err" hidden></div>
    <article id="brief" class="brief" hidden></article>
  </div>

  <script>
    // Same-origin by default (CloudFront routes /api/* to the API). For local dev
    // against `uvicorn` set: const API_BASE = "http://localhost:8000";
    const API_BASE = (location.origin.startsWith("http") ? location.origin : "") + "/api";
    const ORDER = ["PLANNING", "RESEARCHING", "VERIFYING", "SYNTHESIZING", "DONE"];

    const $ = (id) => document.getElementById(id);
    const stagesEl = $("stages"), briefEl = $("brief"), errEl = $("error"), goBtn = $("go");

    function paintStage(status) {
      stagesEl.hidden = false;
      const idx = ORDER.indexOf(status);
      stagesEl.querySelectorAll(".stage").forEach((el) => {
        const i = ORDER.indexOf(el.dataset.s);
        el.classList.toggle("active", i === idx);
        el.classList.toggle("done", i < idx || status === "DONE");
      });
    }

    function renderBrief(brief) {
      briefEl.hidden = false;
      briefEl.innerHTML = marked.parse(brief.markdown || "");
    }

    async function poll(jobId) {
      for (let i = 0; i < 60; i++) {
        const r = await fetch(`${API_BASE}/jobs/${jobId}`);
        const job = await r.json();
        paintStage(job.status);
        if (job.status === "DONE") return renderBrief(job.brief);
        if (job.status === "FAILED") throw new Error(job.error || "pipeline failed");
        await new Promise((res) => setTimeout(res, 1500));
      }
      throw new Error("timed out waiting for the brief");
    }

    $("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      errEl.hidden = true; briefEl.hidden = true; goBtn.disabled = true;
      paintStage("PLANNING");
      try {
        const r = await fetch(`${API_BASE}/jobs`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ topic: $("topic").value, quality: $("quality").checked }),
        });
        if (r.status === 429) throw new Error("daily demo limit reached — try again tomorrow");
        const body = await r.json();
        // Sync (local) path returns the finished job; async returns {job_id}.
        if (body.brief) { paintStage("DONE"); renderBrief(body.brief); }
        else { await poll(body.job_id); }
      } catch (err) {
        errEl.hidden = false; errEl.textContent = err.message;
      } finally {
        goBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
